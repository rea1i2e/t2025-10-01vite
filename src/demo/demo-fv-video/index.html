<%
  const key = 'demoFvVideo';
  const page = ty_getPage(key);
%>
<!DOCTYPE html>
<html lang="ja">
<%- include(ejsPath + 'common/_head.ejs', { page }) %>

<body>
  <%- include(ejsPath + 'common/_header.ejs', { page }) %>

  <section
    class="p-demo-fv-video"
    data-demo-fv-video
    aria-label="<%= ty_stripTags(pages[key].label) %>"
  >
    <video
      class="p-demo-fv-video__media"
      playsinline
      muted
      preload="metadata"
      poster="<%= imagePath %>demo/dummy5.jpg"
      data-pc-src="<%= videoPath %>demo/free-video1-sea-cafinet.mp4"
      data-sp-src="<%= videoPath %>demo/elephant.mp4"
    ></video>
    <div
      class="p-demo-fv-video__sound-group"
      role="group"
      aria-label="動画の音声"
    >
      <button
        type="button"
        class="p-demo-fv-video__sound-btn p-demo-fv-video__sound-btn--mute"
        aria-pressed="true"
        aria-label="ミュート中"
        disabled
      >
        <img
          class="p-demo-fv-video__sound-icon"
          src="<%= imagePath %>common/icon_silence.svg"
          alt=""
          width="24"
          height="24"
          decoding="async"
        />
      </button>
      <button
        type="button"
        class="p-demo-fv-video__sound-btn p-demo-fv-video__sound-btn--unmute"
        aria-pressed="false"
        aria-label="動画の音声をオンにする"
      >
        <img
          class="p-demo-fv-video__sound-icon"
          src="<%= imagePath %>common/icon_sound.svg"
          alt=""
          width="24"
          height="24"
          decoding="async"
        />
      </button>
    </div>
  </section>

  <main class="p-demo">
    <div class="p-demo__inner l-inner">
      <p class="p-demo__desc"><%- pages[key].description %></p>
    </div>
  </main>

  <%- include(ejsPath + 'common/_footer.ejs', { page }) %>
</body>

</html>
