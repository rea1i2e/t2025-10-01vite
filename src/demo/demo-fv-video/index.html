<%
  const key = 'demoFvVideo';
  const page = ty_getPage(key);
%>
<!DOCTYPE html>
<html lang="ja">
<%- include(ejsPath + 'common/_head.ejs', { page }) %>

<body>
  <%- include(ejsPath + 'common/_header.ejs', { page }) %>

  <section
    class="p-demo-fv-video"
    data-demo-fv-video
    aria-label="<%= ty_stripTags(pages[key].label) %>"
  >
    <video
      class="p-demo-fv-video__media"
      playsinline
      muted
      preload="metadata"
      poster="<%= imagePath %>demo/dummy5.jpg"
      data-pc-src="<%= videoPath %>demo/forest.mp4"
      data-sp-src="<%= videoPath %>demo/elephant.mp4"
    ></video>
    <button
      type="button"
      class="p-demo-fv-video__sound"
      aria-pressed="false"
      aria-label="動画の音声をオンにする"
    >
      音声OFF
    </button>
  </section>

  <main class="p-demo">
    <div class="p-demo__inner l-inner">
      <p class="p-demo__desc"><%- pages[key].description %></p>
    </div>
  </main>

  <%- include(ejsPath + 'common/_footer.ejs', { page }) %>
</body>

</html>
